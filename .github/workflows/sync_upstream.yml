name: Sync Upstream

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: [main, dev]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Merge upstream/${{ matrix.branch }}
        run: |
          git remote add upstream https://github.com/MorpheApp/morphe-patches.git
          git fetch upstream ${{ matrix.branch }}
          if git merge-base --is-ancestor upstream/${{ matrix.branch }} HEAD; then
            echo "Already up to date with upstream/${{ matrix.branch }}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge upstream/${{ matrix.branch }} --no-edit
          git push origin ${{ matrix.branch }}
