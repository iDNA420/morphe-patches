name: Assemble and Release

on:
  push:
      branches:
        - main
        - release
  workflow_dispatch:

jobs:
  release:
    name: Release
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute tag
        id: version
        run: |
          v=$(grep -E '^version\s*=' gradle.properties | sed 's/.*=[[:space:]]*//')
          if [ -z "$v" ]; then
            echo "Could not read 'version' from gradle.properties"; exit 1
          fi
          echo "tag=v${v}-release" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        run: |
          git fetch --tags --force
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists. Bump 'version' in gradle.properties before releasing."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v3

      - name: Strip invokeCheck() call
        run: |
          file=patches/src/main/kotlin/app/morphe/patches/shared/misc/checks/BaseCheckEnvironmentPatch.kt
          perl -i -pe 'BEGIN{$c=0} $c += s/^\s*invokeCheck\(\)\n//; END{die "Pattern not found in $ARGV\n" unless $c}' "$file"

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :patches:buildAndroid --no-daemon

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            patches/build/libs/patches-*.mpp \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Attest
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: 'Morphe Patches ${{ steps.version.outputs.tag }}'
          subject-path: patches/build/libs/patches-*.mpp
